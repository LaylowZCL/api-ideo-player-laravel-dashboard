server {
    listen 80;
    server_name fernandozucula.com www.fernandozucula.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name fernandozucula.com www.fernandozucula.com;
    
    root /var/www/fernandozucula.com/public;
    index index.php index.html index.htm;
    
    # SSL Configuration
    ssl_certificate /etc/ssl/certs/fernandozucula.com.crt;
    ssl_certificate_key /etc/ssl/private/fernandozucula.com.key;
    ssl_certificate_trusted_chain /etc/ssl/certs/fernandozucula.com-chain.crt;
    
    # SSL Security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:;" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Laravel configuration
    try_files $uri $uri/ /index.php?$query_string;
    
    # Handle Laravel routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # PHP-FPM configuration
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_connect_timeout 300;
    }
    
    # Deny access to .htaccess files
    location ~ /\.ht {
        deny all;
    }

    # Block hidden files and macOS metadata artifacts.
    location ~ /\.(?!well-known).* {
        deny all;
    }
    
    # Block access to sensitive files
    location ~ ^/(storage|bootstrap|config|database|resources|routes|tests|vendor|artisan|composer\.lock|composer\.json|\.env|\.env\.*) {
        deny all;
    }
    
    # Optimize static files
    location ~* \.(css|js|ico|gif|jpe?g|png|svg|eot|otf|ttf|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Logging
    access_log /var/log/nginx/fernandozucula.com_access.log;
    error_log /var/log/nginx/fernandozucula.com_error.log;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
}

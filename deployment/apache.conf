<VirtualHost *:80>
    ServerName fernandozucula.com
    ServerAlias www.fernandozucula.com
    DocumentRoot /var/www/fernandozucula.com/public
    
    # Redirect HTTP to HTTPS
    Redirect permanent / https://fernandozucula.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName fernandozucula.com
    ServerAlias www.fernandozucula.com
    DocumentRoot /var/www/fernandozucula.com/public
    
    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/fernandozucula.com.crt
    SSLCertificateKeyFile /etc/ssl/private/fernandozucula.com.key
    SSLCertificateChainFile /etc/ssl/certs/fernandozucula.com-chain.crt
    
    # Security headers
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options DENY
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:;"
    
    # Laravel configuration
    <Directory /var/www/fernandozucula.com>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    <Directory /var/www/fernandozucula.com/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    # PHP handling
    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>
    
    # Logging
    ErrorLog ${APACHE_LOG_DIR}/fernandozucula.com_error.log
    CustomLog ${APACHE_LOG_DIR}/fernandozucula.com_access.log combined
    
    # Performance
    EnableSendfile On
    EnableMMAP On
</VirtualHost>
